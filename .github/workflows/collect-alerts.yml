name: Collect Alert History

on:
  schedule:
    - cron: '30 5  * * *'   # 08:30 Київ
    - cron: '30 11 * * *'   # 14:30 Київ
    - cron: '30 17 * * *'   # 20:30 Київ
    - cron: '30 23 * * *'   # 02:30 Київ
  workflow_dispatch:

jobs:
  collect:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

      - name: Fetch and merge alerts + save forecast
        env:
          ALERTS_TOKEN: ${{ secrets.ALERTS_TOKEN }}
        run: |
          set -e

          if [ -z "$ALERTS_TOKEN" ]; then
            echo "❌ ALERTS_TOKEN is not set"
            exit 1
          fi

          echo "Fetching Kyiv oblast..."
          HTTP=$(curl -s -o /tmp/kyiv_fresh.json -w "%{http_code}" \
            -H "Authorization: Bearer $ALERTS_TOKEN" \
            -H "Accept: application/json" \
            "https://api.alerts.in.ua/v1/regions/14/alerts/month_ago.json")
          if [ "$HTTP" != "200" ]; then
            echo "❌ Kyiv fetch failed: HTTP $HTTP"
            cat /tmp/kyiv_fresh.json
            exit 1
          fi
          echo "✅ Kyiv: HTTP $HTTP"

          echo "Fetching Zhytomyr oblast..."
          HTTP=$(curl -s -o /tmp/zhytomyr_fresh.json -w "%{http_code}" \
            -H "Authorization: Bearer $ALERTS_TOKEN" \
            -H "Accept: application/json" \
            "https://api.alerts.in.ua/v1/regions/10/alerts/month_ago.json")
          if [ "$HTTP" != "200" ]; then
            echo "❌ Zhytomyr fetch failed: HTTP $HTTP"
            cat /tmp/zhytomyr_fresh.json
            exit 1
          fi
          echo "✅ Zhytomyr: HTTP $HTTP"

          node << 'NODEEOF'
          const fs = require('fs')

          // ── Читаємо поточну історію ───────────────────────────────────
          let existing = {
            kyiv: [], zhytomyr: [],
            forecasts: { kyiv: [], zhytomyr: [] },
            collection_started_at: null,
          }
          try {
            existing = JSON.parse(fs.readFileSync('data/history.json', 'utf8'))
          } catch (e) {
            console.log('history.json not found, starting fresh')
          }
          if (!existing.forecasts) existing.forecasts = { kyiv: [], zhytomyr: [] }
          if (!existing.forecasts.kyiv) existing.forecasts.kyiv = []
          if (!existing.forecasts.zhytomyr) existing.forecasts.zhytomyr = []

          const kyivFresh     = JSON.parse(fs.readFileSync('/tmp/kyiv_fresh.json',     'utf8'))
          const zhytomyrFresh = JSON.parse(fs.readFileSync('/tmp/zhytomyr_fresh.json', 'utf8'))

          // ── Злиття тривог ─────────────────────────────────────────────
          function merge(existing, incoming) {
            const arr  = Array.isArray(existing) ? existing : []
            const list = Array.isArray(incoming.alerts) ? incoming.alerts : []
            const map  = {}
            arr.forEach(function(a)  { map[a.id] = a })
            list.forEach(function(a) {
              if (!map[a.id] || (!map[a.id].finished_at && a.finished_at)) {
                map[a.id] = a
              }
            })
            return Object.values(map).sort(function(a, b) {
              return new Date(b.started_at) - new Date(a.started_at)
            })
          }

          const kyivAll     = merge(existing.kyiv,     kyivFresh)
          const zhytomyrAll = merge(existing.zhytomyr, zhytomyrFresh)

          // ── Заповнюємо had_alert для вчорашніх прогнозів ─────────────
          function fillActuals(forecasts, alerts) {
            const KYIV_FILTER     = ['Вишгородський район', 'Київська область']
            const ZHYTOMYR_FILTER = ['Житомирський район',  'Житомирська область']

            // Будуємо set годин коли була тривога (UTC, округлено до години)
            const alertHours = new Set()
            alerts.forEach(function(a) {
              if (!a.started_at) return
              const start = new Date(a.started_at)
              const end   = a.finished_at ? new Date(a.finished_at) : new Date(start.getTime() + 3600000)
              // Додаємо кожну годину під час якої тривала тривога
              let cur = new Date(start)
              cur.setMinutes(0, 0, 0)
              while (cur <= end) {
                alertHours.add(cur.toISOString().slice(0, 13))
                cur = new Date(cur.getTime() + 3600000)
              }
            })

            return forecasts.map(function(forecast) {
              const slots = forecast.slots.map(function(slot) {
                if (slot.had_alert !== null && slot.had_alert !== undefined) return slot
                const hourKey = slot.dt.slice(0, 13)
                const isPast  = new Date(slot.dt) < new Date()
                return Object.assign({}, slot, {
                  had_alert: isPast ? alertHours.has(hourKey) : null
                })
              })
              return Object.assign({}, forecast, { slots: slots })
            })
          }

          existing.forecasts.kyiv     = fillActuals(existing.forecasts.kyiv,     kyivAll)
          existing.forecasts.zhytomyr = fillActuals(existing.forecasts.zhytomyr, zhytomyrAll)

          // ── Генеруємо прогноз на наступні 6 годин ────────────────────
          // Використовуємо просту статистику по годинах з накопичених даних
          function makeForecast(alerts) {
            const now = new Date()

            // Підраховуємо скільки разів кожен dow зустрівся у вибірці
            const dowObserved = Array(7).fill(0)
            const datesSeen   = new Set()
            alerts.forEach(function(a) {
              const dateKey = a.started_at.slice(0, 10)
              if (datesSeen.has(dateKey)) return
              datesSeen.add(dateKey)
              const d   = new Date(a.started_at)
              const dow = (d.getDay() + 6) % 7
              dowObserved[dow]++
            })

            // Унікальні дати з тривогою для кожного слоту [dow][hour]
            const slotDates = Array.from({ length: 7 }, function() {
              return Array.from({ length: 24 }, function() { return new Set() })
            })
            alerts.forEach(function(a) {
              const d       = new Date(a.started_at)
              const dow     = (d.getDay() + 6) % 7
              const hour    = d.getHours()
              const dateKey = a.started_at.slice(0, 10)
              slotDates[dow][hour].add(dateKey)
            })

            // Умовна імовірність з Лапласівським згладжуванням
            function slotProb(dow, hour) {
              const observed = dowObserved[dow]
              if (observed === 0) return 0
              const hits = slotDates[dow][hour].size
              return Math.round(((hits + 0.5) / (observed + 1)) * 100) / 100
            }

            const slots = []
            for (let i = 1; i <= 6; i++) {
              const future     = new Date(now.getTime() + i * 3600000)
              future.setMinutes(0, 0, 0)
              const dow  = (future.getDay() + 6) % 7
              const hour = future.getHours()
              slots.push({
                dt       : future.toISOString(),
                prob     : slotProb(dow, hour),
                had_alert: null,
              })
            }

            return { made_at: now.toISOString(), slots: slots }
          }

          // Фільтруємо по районах — як і на фронтенді
          const KYIV_F     = ['Вишгородський район', 'Київська область']
          const ZHYTOMYR_F = ['Житомирський район',  'Житомирська область']
          var kyivFiltered     = kyivAll.filter(function(a) { return KYIV_F.indexOf(a.location_title) !== -1 })
          var zhytomyrFiltered = zhytomyrAll.filter(function(a) { return ZHYTOMYR_F.indexOf(a.location_title) !== -1 })
          var kyivForecast     = makeForecast(kyivFiltered)
          var zhytomyrForecast = makeForecast(zhytomyrFiltered)
          if (kyivForecast)     existing.forecasts.kyiv.push(kyivForecast)
          if (zhytomyrForecast) existing.forecasts.zhytomyr.push(zhytomyrForecast)

          // Тримаємо останні 90 прогнозів (90 днів)
          if (existing.forecasts.kyiv.length > 90)
            existing.forecasts.kyiv = existing.forecasts.kyiv.slice(-90)
          if (existing.forecasts.zhytomyr.length > 90)
            existing.forecasts.zhytomyr = existing.forecasts.zhytomyr.slice(-90)

          // ── Будуємо hourly_actuals ───────────────────────────────────
          // Для кожного дня і кожної години: 1 якщо була тривога, 0 якщо ні
          // Потрібно для розрахунку Recall прогнозу

          function buildHourlyActuals(alerts, filter, startedAt) {
            const filtered = alerts.filter(function(a) {
              return filter.indexOf(a.location_title) !== -1
            })

            // Для кожного дня і години — чи була тривога
            const byDayHour = {}
            filtered.forEach(function(a) {
              // Позначаємо тільки годину ПОЧАТКУ тривоги
              // (не тривалість) — одна тривога = один слот
              const start = new Date(a.started_at)
              const day   = a.started_at.slice(0, 10)
              const hour  = start.getHours()
              if (!byDayHour[day]) byDayHour[day] = {}
              byDayHour[day][hour] = 1
            })

            // Заповнюємо від початку збору до сьогодні
            const start = new Date(startedAt)
            start.setHours(0, 0, 0, 0)
            const today = new Date()
            today.setHours(0, 0, 0, 0)
            const result = {}
            const cur = new Date(start)
            while (cur <= today) {
              const key  = cur.toISOString().slice(0, 10)
              const hours = byDayHour[key] || {}
              // 24 значення: 1 або 0 для кожної UTC години
              result[key] = Array.from({ length: 24 }, function(_, h) {
                return hours[h] ? 1 : 0
              })
              cur.setUTCDate(cur.getUTCDate() + 1)
            }
            return result
          }

          // ── Будуємо daily_counts ─────────────────────────────────────
          const KYIV_FILTER     = ['Вишгородський район', 'Київська область']
          const ZHYTOMYR_FILTER = ['Житомирський район',  'Житомирська область']

          function buildDailyCounts(alerts, filter) {
            const filtered = alerts.filter(function(a) {
              return filter.indexOf(a.location_title) !== -1
            })
            const counts = {}
            filtered.forEach(function(a) {
              const day = a.started_at.slice(0, 10)
              counts[day] = (counts[day] || 0) + 1
            })
            // Заповнюємо нулями від найстарішої тривоги до сьогодні
            const sorted = filtered.slice().sort(function(a, b) {
              return new Date(a.started_at) - new Date(b.started_at)
            })
            const start = sorted.length > 0
              ? new Date(sorted[0].started_at)
              : new Date()
            start.setHours(0, 0, 0, 0)
            const today = new Date()
            today.setHours(0, 0, 0, 0)
            const result = {}
            const cur = new Date(start)
            while (cur <= today) {
              const key = cur.toISOString().slice(0, 10)
              result[key] = counts[key] || 0
              cur.setDate(cur.getDate() + 1)
            }
            return result
          }

          // ── Зберігаємо ───────────────────────────────────────────────
          const now            = new Date().toISOString()
          const collectionStart = existing.collection_started_at || now

          // Рахуємо від найстарішої тривоги в обох регіонах
          const allAlerts  = kyivAll.concat(zhytomyrAll)
          const oldestDate = allAlerts.length > 0
            ? new Date(allAlerts[allAlerts.length - 1].started_at)
            : new Date(collectionStart)
          const daysSince  = Math.floor((new Date() - oldestDate) / 86400000)

          const result = {
            kyiv                 : kyivAll,
            zhytomyr             : zhytomyrAll,
            forecasts            : existing.forecasts,
            daily_counts         : {
              kyiv    : buildDailyCounts(kyivAll,     KYIV_FILTER),
              zhytomyr: buildDailyCounts(zhytomyrAll, ZHYTOMYR_FILTER),
            },
            hourly_actuals        : {
              kyiv    : buildHourlyActuals(kyivAll,     KYIV_FILTER,     collectionStart),
              zhytomyr: buildHourlyActuals(zhytomyrAll, ZHYTOMYR_FILTER, collectionStart),
            },
            collection_started_at: collectionStart,
            updated_at           : now,
            days_collected       : daysSince + 1,
          }

          console.log('Kyiv total:          ' + result.kyiv.length)
          console.log('Zhytomyr total:      ' + result.zhytomyr.length)
          console.log('Kyiv forecasts:      ' + result.forecasts.kyiv.length)
          console.log('Zhytomyr forecasts:  ' + result.forecasts.zhytomyr.length)
          console.log('Days collected:      ' + result.days_collected)
          console.log('Daily counts kyiv:   ' + Object.keys(result.daily_counts.kyiv).length + ' days')

          fs.mkdirSync('data', { recursive: true })
          fs.writeFileSync('data/history.json', JSON.stringify(result))
          console.log('✅ Saved data/history.json')
          NODEEOF

      - name: Commit and push
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/history.json
          git diff --staged --quiet && echo "No changes" || \
            (git commit -m "chore: update alert history $(date -u +%Y-%m-%d)" && git push)