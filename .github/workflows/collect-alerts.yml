name: Collect Alert History

on:
  schedule:
    - cron: '30 23 * * *'
  workflow_dispatch:

jobs:
  collect:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

      - name: Fetch and merge alerts
        env:
          ALERTS_TOKEN: ${{ secrets.ALERTS_TOKEN }}
        run: |
          set -e

          if [ -z "$ALERTS_TOKEN" ]; then
            echo "❌ ALERTS_TOKEN is not set"
            exit 1
          fi

          echo "Fetching Kyiv oblast..."
          HTTP=$(curl -s -o /tmp/kyiv_fresh.json -w "%{http_code}" \
            -H "Authorization: Bearer $ALERTS_TOKEN" \
            -H "Accept: application/json" \
            "https://api.alerts.in.ua/v1/regions/14/alerts/month_ago.json")
          if [ "$HTTP" != "200" ]; then
            echo "❌ Kyiv fetch failed: HTTP $HTTP"
            cat /tmp/kyiv_fresh.json
            exit 1
          fi
          echo "✅ Kyiv: HTTP $HTTP"

          echo "Fetching Zhytomyr oblast..."
          HTTP=$(curl -s -o /tmp/zhytomyr_fresh.json -w "%{http_code}" \
            -H "Authorization: Bearer $ALERTS_TOKEN" \
            -H "Accept: application/json" \
            "https://api.alerts.in.ua/v1/regions/10/alerts/month_ago.json")
          if [ "$HTTP" != "200" ]; then
            echo "❌ Zhytomyr fetch failed: HTTP $HTTP"
            cat /tmp/zhytomyr_fresh.json
            exit 1
          fi
          echo "✅ Zhytomyr: HTTP $HTTP"

          node << 'NODEEOF'
          const fs = require('fs')

          let existing = { kyiv: [], zhytomyr: [], collection_started_at: null }
          try {
            existing = JSON.parse(fs.readFileSync('data/history.json', 'utf8'))
          } catch (e) {
            console.log('history.json not found, starting fresh')
          }

          const kyivFresh     = JSON.parse(fs.readFileSync('/tmp/kyiv_fresh.json',     'utf8'))
          const zhytomyrFresh = JSON.parse(fs.readFileSync('/tmp/zhytomyr_fresh.json', 'utf8'))

          function merge(existing, incoming) {
            const arr  = Array.isArray(existing) ? existing : []
            const list = Array.isArray(incoming.alerts) ? incoming.alerts : []
            const map  = {}
            arr.forEach(function(a)  { map[a.id] = a })
            list.forEach(function(a) {
              if (!map[a.id] || (!map[a.id].finished_at && a.finished_at)) {
                map[a.id] = a
              }
            })
            return Object.values(map).sort(function(a, b) {
              return new Date(b.started_at) - new Date(a.started_at)
            })
          }

          const now = new Date().toISOString()

          const result = {
            kyiv                 : merge(existing.kyiv,     kyivFresh),
            zhytomyr             : merge(existing.zhytomyr, zhytomyrFresh),
            // Зберігаємо дату першого запуску — не перезаписуємо якщо вже є
            collection_started_at: existing.collection_started_at || now,
            updated_at           : now,
          }

          // Рахуємо кількість зібраних днів
          const startDate  = new Date(result.collection_started_at)
          const today      = new Date()
          const daysSince  = Math.floor((today - startDate) / 86400000)
          result.days_collected = daysSince + 1  // +1 бо перший день теж рахується

          console.log('Kyiv total:      ' + result.kyiv.length)
          console.log('Zhytomyr total:  ' + result.zhytomyr.length)
          console.log('Collection start:' + result.collection_started_at)
          console.log('Days collected:  ' + result.days_collected)

          fs.mkdirSync('data', { recursive: true })
          fs.writeFileSync('data/history.json', JSON.stringify(result))
          console.log('✅ Saved data/history.json')
          NODEEOF

      - name: Commit and push
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/history.json
          git diff --staged --quiet && echo "No changes" || \
            (git commit -m "chore: update alert history $(date -u +%Y-%m-%d)" && git push)